name: Daily Auto Posts

on:
  schedule:
    # 한국시간 09:05
    - cron: "5 0 * * *"
    # 한국시간 18:05
    - cron: "5 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate 2 daily posts
        run: python scripts/daily_autopost.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts
          git diff --cached --quiet || git commit -m "자동 생성: 일일 글 2건 추가"
          git push
