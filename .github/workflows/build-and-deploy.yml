name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Build Application
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Vercel/Netlify
        run: |
          echo "Deploying to Vercel/Netlify..."
          # Add deployment command

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text": "Deployment is complete!"}'
          channel-id: 'YOUR_SLACK_CHANNEL_ID'
          token: '${{ secrets.SLACK_TOKEN }}'
